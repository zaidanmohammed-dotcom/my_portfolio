<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> ZIZU 😎</title>
    <style>
        /* خلفية متدرجة مودرن */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #a8dadc 0%, #457b9d 100%);
            color: #1d3557;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* كارد أنيق بظل خفيف */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* تنسيق الصورة الشخصية الدائرية */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #457b9d;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1d3557;
            margin-bottom: 5px;
        }

        .role {
            color: #457b9d;
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            color: #457b9d;
            margin-bottom: 30px;
        }

        /* قسم المهارات */
        .skills-container {
            margin-bottom: 30px;
        }

        .skill-badge {
            display: inline-block;
            background-color: #a8dadc;
            color: #1d3557;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 600;
            margin: 5px;
        }

        /* تنسيق الزر الاحترافي مع تأثير الـ Hover */
        .btn {
            display: inline-block;
            background-color: #1d3557;
            color: #f1faee;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #457b9d;
            transform: translateY(-3px); /* حركة خفيفة للفوق */
        }
    </style>
</head>
<body>

    <div class="card">https:
        <img src="me_jpg.jpeg" alt="الصورة الشخصية" class="profile-img">
        
       <h1>[ZAIDAN.MOHAMMED]</h1>
        <p class="role">مبرمج Flutter & Web Developer متطلع</p>
        
        <p>أنا مبرمج ببدأ رحلتي الاحترافية. بدأت بالـ Flutter والـ Git، وحالياً بستكشف تطوير الويب باستخدام VS Code وعملت الصفحة دي كبداية.</p>
        
        <div class="skills-container">
            <span class="skill-badge">Dart / Flutter</span>
            <span class="skill-badge">Git / GitHub</span>
            <span class="skill-badge">HTML5 & CSS3</span>
            <span class="skill-badge">VS Code</span>
        </div>
        
        <a href="https://github.com/zaidanmohammed-dotcom" target="_blank" class="btn">زور حسابي على GitHub</a>
    </div>

</body>
</html>
